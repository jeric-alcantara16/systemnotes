<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <script>
        // Diagnostic error console helper
        window.addEventListener('error', function(e) {
            const container = document.createElement('div');
            container.style.cssText = 'position:fixed; bottom:20px; right:20px; width:350px; background:#ef4444; color:#fff; font-family:monospace; font-size:11px; padding:16px; border-radius:8px; z-index:99999; box-shadow:0 10px 20px rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.15); line-height:1.4;';
            container.innerHTML = `
                <div style="font-weight:bold; font-size:12px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
                    <span>⚠️ Script Error Detected</span>
                    <button onclick="this.parentElement.parentElement.remove()" style="background:none; border:none; color:#fff; font-size:16px; font-weight:bold; cursor:pointer; padding:0 4px;">&times;</button>
                </div>
                <div style="word-break:break-all;"><strong>Message:</strong> ${e.message}</div>
                <div style="margin-top:6px; opacity:0.8;"><strong>Source:</strong> ${e.filename}:${e.lineno}:${e.colno}</div>
            `;
            if (document.body) {
                document.body.appendChild(container);
            } else {
                window.addEventListener('DOMContentLoaded', () => document.body.appendChild(container));
            }
        });
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Architecture & Design Masterclass</title>
    <meta name="description" content="An interactive educational guide covering fundamentals of system design, cloud architecture, case studies, and modern programming languages.">
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <!-- App Container -->
    <div class="app-container">
        
        <!-- Sidebar Navigation -->
        <aside class="app-sidebar" id="appSidebar">
            <div class="sidebar-header">

                        <polyline points="2 17 12 22 22 17"></polyline>
                        <polyline points="2 12 12 17 22 12"></polyline>
                    </svg>

                    <span style="width: 10px; height: 10px; border-radius: 50%; background: #eab308; display: inline-block;"></span>
                    <span>In Progress</span>

        <!-- Main Content Area -->

                    </div>

                    <!-- Theme Toggle Button -->
                    <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="Toggle theme">
                        <!-- Sun Icon (visible in Dark Mode) -->
                        <svg class="sun-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                        <!-- Moon Icon (visible in Light Mode) -->
                        <svg class="moon-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </button>
                </div>
            </header>

            <!-- Content Container -->
            <div class="content-container" id="contentContainer">
                
                <!-- System Design Task Tracker View -->
                <div class="view-panel active" id="checklistView">
                    <div class="page-header">
                        <h1>System Design Task Tracker</h1>
                        <p>A premium, spreadsheet-inspired productivity system to plan, prioritize, and log your architecture milestones in real-time. Automatically saved offline.</p>
                    </div>
                    <div class="checklist-wrapper" id="checklistWrapper">
                        <!-- Injected dynamically -->
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Inject Lessons Data first, then main application JS -->
    <script src="./lessons.js"></script>
    <script src="./app.js?v=2.0.0"></script>
</body>
</html>
